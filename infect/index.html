<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Funfection Infect</title>
</head>
<body>
  <p id="msg">Opening Funfection…</p>

  <script>
    // Example: read ?code= from the URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";

    const deepLink = "funfection://infect?code=" + encodeURIComponent(code);

    // Try immediately
    window.location.href = deepLink;

    // Try again after a moment (sometimes helps on mobile)
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1000);

    // Optional: fallback message
    setTimeout(() => {
      document.getElementById("msg").textContent =
        "If nothing happened, make sure the Funfection app is installed, then try again.";
    }, 1500);
  </script>
</body>
</html>
