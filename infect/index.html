<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Funfection Infect</title>
</head>
<body>
<p id="msg">Opening Funfection…</p>

<script>
    // Example: read ?code= from the URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";

    // Preserve the fragment as a hash on the deep link
    // window.location.hash includes the leading "#"
    const hash = window.location.hash || "";

    const deepLink =
        "funfection://infect?code=" + encodeURIComponent(code) +
        (hash ? "#" + encodeURIComponent(hash.slice(1)) : "");

    // Try immediately
    window.location.href = deepLink;

    // Try again after a moment (sometimes helps on mobile)
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1000);

    // Optional: fallback message
    setTimeout(() => {
      const msgElement = document.getElementById("msg");
      msgElement.innerHTML = 
        "If nothing happened, make sure the Funfection app is installed, then try again.<br><br>" +
        "Or click here: <a href=\"" + deepLink + "\">" + deepLink + "</a>";
    }, 1500);
</script>
</body>
</html>
