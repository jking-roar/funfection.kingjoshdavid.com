<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Editor | Funfection</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #d6dce8;
      --text: #1e2530;
      --muted: #637083;
      --accent: #2563eb;
      --accent-hover: #1e4fc2;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(21, 36, 66, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 520px) 1fr;
      gap: 1rem;
      padding: 1rem;
      height: 100vh;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel header {
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1rem;
    }

    h1 {
      font-size: 1.125rem;
      margin: 0;
    }

    .sub {
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    button,
    .file-button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      padding: 0.55rem 0.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    .file-button:hover {
      background: var(--accent-hover);
    }

    button.secondary {
      background: #4b5563;
    }

    button.secondary:hover {
      background: #3b4450;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #b91c1c;
    }

    #fileInput {
      display: none;
    }

    textarea {
      width: 100%;
      border: none;
      border-radius: 0 0 12px 12px;
      resize: none;
      flex: 1;
      min-height: 0;
      padding: 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.4;
      background: #fcfdff;
      color: #111827;
      outline: none;
    }

    .preview-wrap {
      padding: 1rem;
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .preview {
      min-height: 100%;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: white;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .placeholder {
      color: var(--muted);
      text-align: center;
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 0 1rem 1rem;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .panel {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel" aria-label="SVG source editor">
      <header>
        <h1>SVG Editor</h1>
        <div class="sub">Open, edit, preview, and download SVG files.</div>
      </header>

      <div class="controls">
        <label for="fileInput" class="file-button">Open SVG File</label>
        <input id="fileInput" type="file" accept=".svg,image/svg+xml" />
        <button id="downloadBtn" type="button">Download SVG</button>
        <button id="formatBtn" type="button" class="secondary">Format</button>
        <button id="resetBtn" type="button" class="danger">Reset</button>
      </div>

      <textarea id="svgInput" spellcheck="false" aria-label="SVG markup"></textarea>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section class="panel" aria-label="Live SVG preview">
      <header>
        <h1>Live Preview</h1>
        <div class="sub">The right panel updates as you type.</div>
      </header>
      <div class="preview-wrap">
        <div id="preview" class="preview">
          <p class="placeholder">Paste or open an SVG to see the preview.</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const sampleSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="420" height="220" viewBox="0 0 420 220" role="img" aria-label="Sample">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="420" height="220" rx="18" fill="url(#bg)"/>
  <circle cx="90" cy="110" r="55" fill="#ffffff22"/>
  <text x="210" y="118" text-anchor="middle" font-size="36" font-family="Verdana, sans-serif" fill="white">Funfection</text>
</svg>`;

    const svgInput = document.getElementById('svgInput');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const formatBtn = document.getElementById('formatBtn');

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.classList.toggle('error', isError);
    }

    function renderSvg() {
      const source = svgInput.value.trim();
      if (!source) {
        preview.innerHTML = '<p class="placeholder">Paste or open an SVG to see the preview.</p>';
        setStatus('Editor is empty.');
        return;
      }

      if (!source.includes('<svg') || !source.includes('</svg>')) {
        preview.innerHTML = '<p class="placeholder">Current content is not valid SVG markup.</p>';
        setStatus('Missing <svg> root element.', true);
        return;
      }

      preview.innerHTML = source;
      setStatus('Preview updated successfully.');
    }

    function loadTextFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        svgInput.value = String(reader.result || '');
        renderSvg();
        setStatus(`Loaded ${file.name}.`);
      };
      reader.onerror = () => {
        setStatus('Could not read file.', true);
      };
      reader.readAsText(file);
    }

    function downloadSvg() {
      const content = svgInput.value.trim();
      if (!content) {
        setStatus('Nothing to download yet.', true);
        return;
      }

      const blob = new Blob([content], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'image.svg';
      link.click();
      URL.revokeObjectURL(url);
      setStatus('Downloaded image.svg.');
    }

    function formatSvg() {
      const content = svgInput.value.trim();
      if (!content) {
        setStatus('Nothing to format.', true);
        return;
      }

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(content, 'image/svg+xml');
      if (xmlDoc.querySelector('parsererror')) {
        setStatus('Cannot format: SVG markup is invalid XML.', true);
        return;
      }

      const serialized = new XMLSerializer().serializeToString(xmlDoc.documentElement);
      svgInput.value = serialized.replace(/></g, '>\n<');
      renderSvg();
      setStatus('SVG formatted.');
    }

    svgInput.addEventListener('input', renderSvg);

    fileInput.addEventListener('change', (event) => {
      const [file] = event.target.files || [];
      if (file) {
        loadTextFile(file);
      }
      event.target.value = '';
    });

    downloadBtn.addEventListener('click', downloadSvg);
    resetBtn.addEventListener('click', () => {
      svgInput.value = sampleSvg;
      renderSvg();
      setStatus('Loaded sample SVG.');
    });
    formatBtn.addEventListener('click', formatSvg);

    svgInput.value = sampleSvg;
    renderSvg();
  </script>
</body>
</html>
